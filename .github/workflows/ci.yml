name: CI

on:
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Python lint and typing
        run: |
          ruff check backend tests
          black --check backend tests
          mypy backend
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Frontend quality checks
        working-directory: frontend
        run: |
          npm run lint
          npx prettier --check .
          npm run typecheck

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: codesentinel
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d codesentinel"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
      qdrant:
        image: qdrant/qdrant:v1.9.2
        ports: ['6333:6333']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Check service availability
        id: service_check
        run: |
          python - <<'PY'
          import os
          import socket

          services = [
              ("postgres", "127.0.0.1", 5432),
              ("redis", "127.0.0.1", 6379),
              ("qdrant", "127.0.0.1", 6333),
          ]
          failures = []

          for name, host, port in services:
              sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
              sock.settimeout(2)
              try:
                  sock.connect((host, port))
              except Exception:
                  failures.append(name)
              finally:
                  sock.close()

          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as f:
              if failures:
                  f.write("services_ready=false\n")
                  f.write(f"missing_services={','.join(failures)}\n")
              else:
                  f.write("services_ready=true\n")
          PY

      - name: Run pytest with coverage (full)
        if: steps.service_check.outputs.services_ready == 'true'
        run: pytest --cov=backend --cov=tests --cov-fail-under=80

      - name: Run pytest fallback (unit only)
        if: steps.service_check.outputs.services_ready != 'true'
        run: pytest tests/unit --cov=backend --cov=tests --cov-fail-under=60

      - name: Upload to Codecov
        continue-on-error: true
        uses: codecov/codecov-action@v4

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - working-directory: frontend
        run: npm ci
      - name: Jest tests
        working-directory: frontend
        run: npm test
      - name: Playwright tests
        working-directory: frontend
        run: npx playwright install --with-deps && npm run test:e2e

  security-scan:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install bandit snyk
      - name: Bandit
        run: bandit -r backend -ll
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: '1'
      - name: Snyk scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --severity-threshold=high

  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build backend
        run: docker build -f backend/Dockerfile -t ghcr.io/${{ github.repository }}/backend:${{ github.sha }} .
      - name: Build frontend
        run: docker build -f frontend/Dockerfile -t ghcr.io/${{ github.repository }}/frontend:${{ github.sha }} .
      - name: Push images
        continue-on-error: true
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag ghcr.io/${{ github.repository }}/backend:${{ github.sha }} ghcr.io/${{ github.repository }}/backend:latest
          docker tag ghcr.io/${{ github.repository }}/frontend:${{ github.sha }} ghcr.io/${{ github.repository }}/frontend:latest
          docker push ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/backend:latest
          docker push ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/frontend:latest

  terraform-plan:
    continue-on-error: true
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init and plan
        working-directory: infrastructure/terraform/envs/prod
        run: |
          terraform init
          terraform plan -out=plan.tfplan
          terraform show -no-color plan.tfplan > plan.txt
      - name: Comment plan
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: infrastructure/terraform/envs/prod/plan.txt
