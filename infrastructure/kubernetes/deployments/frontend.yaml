apiVersion: apps/v1
kind: Deployment
metadata:
  name: codesentinel-frontend
  namespace: codesentinel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: codesentinel-frontend
  template:
    metadata:
      labels:
        app: codesentinel-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/example/codesentinel/frontend:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "800m"
              memory: "768Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
