apiVersion: apps/v1
kind: Deployment
metadata:
  name: codesentinel-backend
  namespace: codesentinel
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: codesentinel-backend
  template:
    metadata:
      labels:
        app: codesentinel-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/example/codesentinel/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: codesentinel-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: codesentinel-backend-hpa
  namespace: codesentinel
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: codesentinel-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
