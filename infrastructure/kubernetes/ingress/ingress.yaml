apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: codesentinel-ingress
  namespace: codesentinel
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - codesentinel.example.com
      secretName: codesentinel-tls
  rules:
    - host: codesentinel.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: codesentinel-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: codesentinel-frontend
                port:
                  number: 3000
